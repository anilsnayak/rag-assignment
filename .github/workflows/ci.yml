name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------ #
      # 1. Checkout
      # ------------------------------------------------------------------ #
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------ #
      # 2. Set up Python
      # ------------------------------------------------------------------ #
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ------------------------------------------------------------------ #
      # 3. Install dependencies
      # ------------------------------------------------------------------ #
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      # ------------------------------------------------------------------ #
      # 4. Lint with Ruff
      # ------------------------------------------------------------------ #
      - name: Lint with Ruff
        run: |
          ruff check app/ tests/ --output-format=github

      # ------------------------------------------------------------------ #
      # 5. Type-check with mypy
      # ------------------------------------------------------------------ #
      - name: Type-check with mypy
        run: |
          mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # Type hints are best-effort in early stage

      # ------------------------------------------------------------------ #
      # 6. Run unit tests (no LLM/Ollama required)
      # ------------------------------------------------------------------ #
      - name: Run tests
        env:
          # Point Chroma to a temp location so tests don't conflict
          CHROMA_PERSIST_DIRECTORY: /tmp/test_chroma
          DOCUMENTS_DIRECTORY: /tmp/test_documents
          METADATA_DIRECTORY: /tmp/test_metadata
          OLLAMA_BASE_URL: http://localhost:11434
          OLLAMA_MODEL: qwen3.5:4b
        run: |
          pytest tests/ -v --tb=short

  # ------------------------------------------------------------------ #
  # Docker build validation
  # ------------------------------------------------------------------ #
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t rag-assignment:ci .
